# ─────────────────────────────────────────────────────────────────────────────
# RÈGLE : Port Scan — T1046
# CORRECTIONS APPLIQUÉES :
#   - "log_type: scan" → "event_action: connection_blocked" (signal réel)
#   - Ajout count_type: cardinality + cardinality_field: dest_port
#     (compter les ports DISTINCTS, pas le nombre total de connexions)
#   - Ajout group_by: source_ip
#   - Ajout confidence_score
# POURQUOI cardinality :
#   Un scan Nmap envoie des SYN vers N ports différents depuis la même IP.
#   Ce qui est anormal, c'est le nombre de ports distincts (fan-out),
#   pas le nombre total de paquets.
# ─────────────────────────────────────────────────────────────────────────────
id: port-scan-detection
nom: "Scan de ports réseau (MITRE T1046)"
description: |
  Détecte un scan de ports réseau : 20+ ports distincts bloqués par le firewall
  depuis la même IP en 60 secondes. Détection basée sur la cardinalité
  des ports de destination (fan-out pattern), pas sur le volume total.
  Référence : MITRE T1046 — Network Service Scanning.
type: seuil
condition:
  event_action: "connection_blocked"
  group_by: "source_ip"
  threshold: 20
  count_type: "cardinality"
  cardinality_field: "dest_port"
fenetre_temporelle_s: 60
mitre_tactic: "TA0007"
mitre_technique_id: "T1046"
niveau_alerte_genere: WARNING
confidence_score: 78
kill_chain_phase: "recon"
active: true
