# ============================================================
# all_rules.yaml — Règles de corrélation Smart SIEM v2
# ============================================================
# CORRECTIONS P1-A appliquées :
#   - ssh_auth_failure → login_failed   (valeur du simulateur)
#   - ssh_auth_success → login_success  (valeur du simulateur)
#   - AD event_action corrigé           (login_failed)
# SUPPRESSIONS :
#   - anomaly_traffic_volume : type "statistical" non implémenté
#   - exfil-web-service : field "normalized_fields.event_type" inexistant
# ============================================================

# ── R1 : SSH Brute Force ─────────────────────────────────────
id: brute-force-ssh
nom: "Brute Force SSH (MITRE T1110)"
description: |
  5+ login_failed depuis la même IP en 60 secondes.
type: seuil
condition:
  event_action: "login_failed"
  group_by: "source_ip"
  threshold: 5
fenetre_temporelle_s: 60
mitre_tactic: "TA0001"
mitre_technique_id: "T1110"
niveau_alerte_genere: HIGH
confidence_score: 85
active: true

---

# ── R2 : Port Scan ───────────────────────────────────────────
id: port-scan-detection
nom: "Scan de ports réseau (MITRE T1046)"
description: |
  20+ ports de destination DISTINCTS bloqués par le firewall
  depuis la même IP en 60s. Détection par cardinalité (fan-out).
type: seuil
condition:
  event_action: "connection_blocked"
  group_by: "source_ip"
  threshold: 20
  count_type: "cardinality"
  cardinality_field: "dest_port"
fenetre_temporelle_s: 60
mitre_tactic: "TA0007"
mitre_technique_id: "T1046"
niveau_alerte_genere: WARNING
confidence_score: 78
active: true

---

# ── R3 : SSH Lateral Movement ─────────────────────────────────
id: ssh-lateral-movement
nom: "Mouvement Latéral SSH (MITRE T1021.004)"
description: |
  Séquence login_success → file_read depuis la même IP interne en 300s.
type: séquence
condition:
  sequence:
    - "login_success"
    - "file_read"
  group_by: "source_ip"
  filter:
    is_internal_src: true
  max_step_gap_seconds: 280
fenetre_temporelle_s: 300
mitre_tactic: "TA0008"
mitre_technique_id: "T1021"
niveau_alerte_genere: CRITICAL
confidence_score: 82
active: true

---

