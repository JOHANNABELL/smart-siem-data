# ── R5 : Firewall + AD Correlation ───────────────────────────
id: firewall-ad-correlation
nom: "Corrélation Firewall + AD (MITRE T1078)"
description: |
  Même IP bloquée par le firewall ET échec auth AD en 5 minutes.
  CORRECTION : active_directory event_action = login_failed (simulateur).
type: composite
condition:
  type: "cross_source"
  sources:
    - "firewall"
    - "active_directory"
  events:
    firewall: "connection_blocked"
    active_directory: "login_failed"
  group_by: "source_ip"
fenetre_temporelle_s: 300
mitre_tactic: "TA0001"
mitre_technique_id: "T1078"
niveau_alerte_genere: HIGH
confidence_score: 70
active: true

