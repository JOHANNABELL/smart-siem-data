id: cross_source_account_compromise
nom: Suspicion de compromission de compte inter-sources
description: Detecte un meme utilisateur observe dans plusieurs sources avec echec auth, succes anormal et anomalie endpoint.
type: cross_source
condition:
  entity_field: normalized_fields.username
  min_sources: 2
  steps:
    - field: log_type
      value: auth
    - field: log_type
      value: endpoint
    - field: severity
      value: critical
fenetre_temporelle_s: 600
mitre_tactic: credential_access
mitre_technique_id: T1078
niveau_alerte_genere: CRITICAL
cve_references: []
kill_chain_phase: credential_access
active: true
